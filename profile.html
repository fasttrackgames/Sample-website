<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - FastPharma API</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        /* Premium Glassmorphism Input Fields */
        input[type="text"], input[type="tel"], textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.25); /* Dark transparent background */
            color: white;
            font-family: inherit;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.3s ease, background 0.3s ease;
        }

        input[type="text"]:focus, input[type="tel"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
        }

        input::placeholder, textarea::placeholder {
            color: #94a3b8;
        }

        /* Support Button Styling */
        .support-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .support-btn:hover, .support-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">FastPharma</div>
        <div class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="upload.html" class="nav-item">Upload</a>
            <a href="cart.html" class="nav-item">Cart</a>
            <a href="profile.html" class="nav-item active">Profile</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px; margin-top: 40px;">
        
        <h2 style="color: white; margin-bottom: 5px;">Patient Configuration</h2>
        <p style="color: #cbd5e1; font-size: 14px; margin-bottom: 25px;">Manage your secure delivery details and history.</p>

        <div class="card" style="display: block; margin-bottom: 30px;">
            <h3 style="margin-top: 0; margin-bottom: 20px; color: #38bdf8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Primary Details</h3>
            
            <input type="text" placeholder="Full Legal Name">
            <input type="tel" placeholder="Mobile Number (For Delivery Updates)">
            <textarea placeholder="Complete Delivery Address (Banibon Bazar Area)" rows="3" style="resize: vertical;"></textarea>
            
            <button class="action-btn" onclick="alert('Profile details securely synced to cloud!')">
                <i class="fas fa-user-shield"></i> Save Configuration
            </button>
        </div>

        <div class="card" style="display: block;">
            <h3 style="margin-top: 0; margin-bottom: 20px; color: #38bdf8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Account Services</h3>
            
            <a href="orders.html" style="text-decoration: none;">
                <button class="action-btn" style="background: var(--primary); margin-bottom: 15px;">
                    <i class="fas fa-file-invoice"></i> View Official Invoices
                </button>
            </a>

            <button class="support-btn" onclick="triggerWhatsAppSupport()">
                <i class="fas fa-headset"></i> Contact Pharmacist Support
            </button>
            
            <p style="text-align: center; color: #64748b; font-size: 12px; margin-top: 20px; margin-bottom: 0;">
                FastPharma API v2.4.1 • Encrypted Connection
            </p>
        </div>

    </div>

    <script src="script.js"></script>
    <script>
        // Specific WhatsApp trigger for the Support button
        function triggerWhatsAppSupport() {
            let phoneNumber = "919876543210"; // Replace with the pharmacist's number later
            let message = "Hello, I am a patient requiring assistance with my FastPharma account/delivery.";
            window.location.href = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
        }
    </script>
</body>
</html>
